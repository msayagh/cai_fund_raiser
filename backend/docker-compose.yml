services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: mosque-backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-api.rule=Host(`portal.ccai-stjean.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.portal-api.entrypoints=websecure"
      - "traefik.http.routers.portal-api.tls=true"
      - "traefik.http.services.portal-api.loadbalancer.server.port=3001"
    environment:
      SQLITE_DATABASE_URL: file:/app/data/dev.db
    volumes:
      - backend_sqlite_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - root_default

networks:
  root_default:
    external: true

volumes:
  backend_sqlite_data:
  backend_uploads:
  backend_logs:
  mysql_data:
