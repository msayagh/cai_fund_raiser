services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mosque-backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      SQLITE_DATABASE_URL: file:/app/data/dev.db
    volumes:
      - backend_sqlite_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    restart: unless-stopped

volumes:
  backend_sqlite_data:
  backend_uploads:
  backend_logs:
