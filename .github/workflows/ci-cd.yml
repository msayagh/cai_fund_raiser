name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        
      - name: Lint source
        run: npm run lint:source

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /docker/donations/app
            git pull
            npm install
            docker compose down
            docker compose build --no-cache
            docker compose up -d
