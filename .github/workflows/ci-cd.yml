name: CI/CD

on:
  pull_request:
  push:
    branches:
      - user_accounts
  workflow_dispatch:

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Generate Prisma client
        run: npm --prefix backend run db:generate

      - name: Build backend Docker image
        run: docker build -t mosque-backend-ci ./backend

  deploy:
    name: Deploy To Host
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            BRANCH="${{ github.ref_name }}"

            if [ -z "$DEPLOY_DIR" ]; then
              echo "DEPLOY_PATH secret is required."
              exit 1
            fi

            mkdir -p "$DEPLOY_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone "https://github.com/${{ github.repository }}.git" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${{ secrets.BACKEND_ENV_B64 }}" ]; then
              echo "${{ secrets.BACKEND_ENV_B64 }}" | base64 -d > backend/.env
            fi

            cd backend
            docker compose down --remove-orphans || true
            docker compose up -d --build
            docker image prune -f || true
